version: 2

models:
  - name: dim_date
    description: "Date dimension table generated from 2019-01-01 to current date. Used for time-based analysis in Looker Studio."
    config:
      materialized: table
      schema: serve

    columns:
      - name: date_id
        description: "Primary key in YYYYMMDD format"
        tests:
          - unique
          - not_null

      - name: full_date
        description: "Full date value"
        tests:
          - not_null

      - name: year
        description: "Year e.g. 2026"

      - name: quarter
        description: "Quarter number 1-4"

      - name: month
        description: "Month number 1-12"

      - name: week_of_year
        description: "Week number of the year"

      - name: day_of_month
        description: "Day of month 1-31"

      - name: day_of_week
        description: "Day of week 1-7"

      - name: month_name
        description: "Month name e.g. January"

      - name: day_name
        description: "Day name e.g. Monday"

      - name: year_month
        description: "Year and month e.g. 2026-01"

      - name: quarter_label
        description: "Quarter label e.g. Q1-2026"

      - name: is_weekend
        description: "True if Saturday or Sunday"

      - name: is_today
        description: "True if date is today"

      - name: is_past
        description: "True if date is in the past"

      - name: partition_key
        description: "First day of current month from batch_run"
        tests:
          - not_null

      - name: run_datetime
        description: "Exact timestamp of dbt run from batch_run"
        tests:
          - not_null
