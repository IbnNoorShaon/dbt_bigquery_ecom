version: 2

models:
  - name: raw_distribution_centers
    description: "Raw view of distribution centers from thelook_ecommerce public dataset."
    config:
      materialized: view
      schema: raw

    columns:
      - name: id
        description: "Primary key for distribution centers"
        tests:
          - unique
          - not_null

      - name: name
        description: "Name of the distribution center"
        tests:
          - not_null

      - name: latitude
        description: "Geographic latitude of the distribution center"

      - name: longitude
        description: "Geographic longitude of the distribution center"

      - name: _loaded_at
        description: "Timestamp when the view was queried"

      - name: _source_database
        description: "Source GCP project"

      - name: _source_schema
        description: "Source dataset name"

      - name: _source_table
        description: "Source table name"

      - name: _dbt_invocation_id
        description: "Unique dbt run invocation ID"

      - name: _environment
        description: "dbt environment e.g. development or production"
