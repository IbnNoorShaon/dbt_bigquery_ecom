version: 2

models:
  - name: raw_inventory_items
    description: "Raw view of inventory items from thelook_ecommerce public dataset."
    config:
      materialized: view
      schema: raw

    columns:
      - name: id
        description: "Primary key for inventory items"
        tests:
          - unique
          - not_null

      - name: product_id
        description: "FK to products"
        tests:
          - not_null

      - name: created_at
        description: "Timestamp when inventory item was created"
        tests:
          - not_null

      - name: sold_at
        description: "Timestamp when inventory item was sold"

      - name: cost
        description: "Cost of the inventory item in USD"

      - name: product_category
        description: "Category of the product"

      - name: product_name
        description: "Name of the product"

      - name: product_brand
        description: "Brand of the product"

      - name: product_retail_price
        description: "Retail price of the product in USD"

      - name: product_department
        description: "Department of the product e.g. Men, Women"

      - name: product_sku
        description: "Stock keeping unit identifier"

      - name: product_distribution_center_id
        description: "FK to distribution centers"

      - name: _loaded_at
        description: "Timestamp when the view was queried"

      - name: _source_database
        description: "Source GCP project"

      - name: _source_schema
        description: "Source dataset name"

      - name: _source_table
        description: "Source table name"

      - name: _dbt_invocation_id
        description: "Unique dbt run invocation ID"

      - name: _environment
        description: "dbt environment e.g. development or production"
