version: 2

models:
  - name: prep_users
    description: "Cleaned and enriched user profiles with age groups and full name."
    config:
      materialized: view
      schema: prep

    columns:
      - name: user_id
        description: "Primary key for users"
        tests:
          - unique
          - not_null

      - name: first_name
        description: "User first name"

      - name: last_name
        description: "User last name"

      - name: full_name
        description: "Concatenated first and last name"

      - name: email
        description: "User email address"
        tests:
          - not_null:
              config:
                severity: warn

      - name: gender
        description: "User gender"

      - name: age
        description: "User age in years"

      - name: age_group
        description: "Age group bucket e.g. 18-24, 25-34"
        tests:
          - accepted_values:
              arguments:
                values: ['Under 18', '18-24', '25-34', '35-44', '45-54', '55+']
              config:
                severity: warn

      - name: city
        description: "User city"

      - name: state
        description: "User state"

      - name: country
        description: "User country"

      - name: postal_code
        description: "User postal code"

      - name: latitude
        description: "Geographic latitude"

      - name: longitude
        description: "Geographic longitude"

      - name: traffic_source
        description: "Marketing channel that acquired the user"

      - name: user_created_at
        description: "Timestamp when user account was created"
        tests:
          - not_null

      - name: user_created_date
        description: "Date when user account was created"

      - name: user_created_year
        description: "Year when user account was created"

      - name: _loaded_at
        description: "Timestamp when the view was queried"

      - name: _source_database
        description: "Source GCP project"

      - name: _source_schema
        description: "Source dataset name"

      - name: _source_table
        description: "Source table name"

      - name: _dbt_invocation_id
        description: "Unique dbt run invocation ID"

      - name: _environment
        description: "dbt environment e.g. development or production"